<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Source Map Hunter</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <header>
            <div>
                <h1>Source Map Hunter</h1>
                <p id="subtitle">Scanning current tab</p>
            </div>
            <button id="refresh" type="button" title="Refresh">↻</button>
        </header>

        <main>
            <section id="summary" class="summary">
                <div class="count" id="count">0</div>
                <div>
                    <strong>confirmed source maps</strong>
                    <p id="pageUrl">No page data yet.</p>
                </div>
            </section>

            <section id="empty" class="empty">
                No confirmed JavaScript source maps detected on this tab.
            </section>

            <section id="list" class="list" hidden></section>
        </main>

        <footer>
            <button id="clear" type="button">Clear tab results</button>
        </footer>

        <script src="../shared/zip.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
